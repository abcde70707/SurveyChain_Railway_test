version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: surveychain-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: web3survey
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Go Backend ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: surveychain-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: web3survey
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-change-me}
      FRONTEND_URL: http://localhost:80
    ports:
      - "8080:8080"

  # ── React Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend/client
      dockerfile: ../../deploy/frontend/Dockerfile
      args:
        VITE_CONTRACT_ADDRESS: ${VITE_CONTRACT_ADDRESS:-0x0000000000000000000000000000000000000000}
    container_name: surveychain-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      # 把 nginx.conf 掛入容器，方便本地修改不用 rebuild
      - ./deploy/frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: surveychain-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-web3survey}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: surveychain-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-web3survey}
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      FRONTEND_URL: http://localhost
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend/client
      dockerfile: Dockerfile
      args:
        VITE_CONTRACT_ADDRESS: ${VITE_CONTRACT_ADDRESS:-}
        VITE_API_BASE_URL: ""
    container_name: surveychain-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./frontend/client/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
